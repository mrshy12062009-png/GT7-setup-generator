<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GT7 Setup Generator</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:12px;
}

select,button{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.result{
margin-top:30px;
background:#020617;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
GT7 Setup Generator
</header>

<div class="container">

<div class="card">

<h2>Select Car</h2>
<select id="car"></select>

<h2>Select Track</h2>
<select id="track"></select>

<h2>Tyres</h2>
<select id="tyres">

<option value="race">Racing</option>
<option value="sport">Sport</option>
<option value="comfort">Comfort</option>

</select>

<button onclick="generate()">Generate Setup</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

async function loadCars(){

let response = await fetch("cars.json")
let cars = await response.json()

let dropdown = document.getElementById("car")

cars.forEach(car => {

let option = document.createElement("option")

option.value = car.drive
option.textContent = car.name

dropdown.appendChild(option)

})

}

async function loadTracks(){

let response = await fetch("tracks.json")
let tracks = await response.json()

let dropdown = document.getElementById("track")

tracks.forEach(track => {

let option = document.createElement("option")

option.value = track.type
option.textContent = track.name

dropdown.appendChild(option)

})

}

function generate(){

let car=document.getElementById("car").value
let track=document.getElementById("track").value
let tyres=document.getElementById("tyres").value

let rideHeight=""
let springRate=""
let diff=""
let downforce=""
let gearbox=""

if(track=="technical"){
rideHeight="Low"
springRate="Soft"
downforce="High"
gearbox="Short"
}

if(track=="highspeed"){
rideHeight="Very Low"
springRate="Stiff"
downforce="Low"
gearbox="Long"
}

if(track=="mixed"){
rideHeight="Medium"
springRate="Medium"
downforce="Medium"
gearbox="Balanced"
}

if(car=="FR"){
diff="10 / 25 / 20"
}

if(car=="MR"){
diff="8 / 20 / 15"
}

if(car=="AWD"){
diff="15 / 30 / 25"
}

if(car=="FF"){
diff="5 / 15 / 10"
}

if(tyres=="comfort"){
springRate="Soft"
}

if(tyres=="race"){
springRate="Stiff"
}

document.getElementById("result").innerHTML=

`
<h2>Recommended Setup</h2>

Ride Height: ${rideHeight}<br>
Spring Rate: ${springRate}<br>
Differential: ${diff}<br>
Downforce: ${downforce}<br>
Gearbox: ${gearbox}

`

}

loadCars()
loadTracks()

</script>

</body>
</html>
